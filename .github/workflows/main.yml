name: Build and test

on: push

env:
  LANG: en_US.UTF-8
  UV_FROZEN: true

defaults:
  run:
    shell: bash

permissions: {}

jobs:
  checks:
    permissions:
      contents: read # checkout
      pull-requests: write # reviewdog
    runs-on: ubuntu-24.04
    container: globeswiss/cloud-sdk:py3.12.12-554.0.0@sha256:3db9a24c68fdafd462600db739da909cbb17eca502828f4d3696a9c2d0484790
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Sync dev dependencies
        run: uv sync
      - name: Check requirements file
        run: diff -w <(uv export --format requirements-txt --no-hashes --no-dev | grep '==') <(grep '==' requirements.txt)
        if: ${{ !startsWith(github.ref, 'refs/heads/renovate/') && github.event.head_commit.author.name != 'renovate[bot]' }}
      - name: Check bandit
        run: uv run bandit -r test phenoback main.py -c .bandit
        if: always()
      - name: Check pylint
        run: uv run pylint --reports=y phenoback test main.py
        if: always()
      - name: Check black
        uses: reviewdog/action-black@9b4feb439b707a9b7673086795cc53e417a03abe # v3.23.0
        with:
          reporter: github-check
          verbose: True
          fail_on_error: True
        if: always()
      - name: Check markdownlint
        uses: reviewdog/action-markdownlint@6f0e0e8703a9e840ffefa37a2775832c51c1c640 # v0.28.0
        with:
          reporter: github-check
          fail_level: warning
        if: always()
  test:
    permissions:
      id-token: write # codecov oidc
      contents: read # checkout
    runs-on: ubuntu-24.04
    container: globeswiss/cloud-sdk:py3.12.12-554.0.0@sha256:3db9a24c68fdafd462600db739da909cbb17eca502828f4d3696a9c2d0484790
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      - name: Sync dev dependencies
        run: uv sync
      - name: Run pytest
        run: uv run python -m pytest --cov-report xml --cov=main --cov=phenoback --cov-branch
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          use_oidc: true
          files: ./coverage.xml
          flags: unittests
        if: always()
  zizmor:
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read # only needed for private repos
      actions: read # only needed for private repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
